name: "Feature Request / 功能建议"
description: "建议 SDK 或 CLI 支持新功能或改进"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！好的功能想法是项目前进的重要动力。
  - type: textarea
    id: problem
    attributes:
      label: 问题或场景
      description: 你希望解决什么问题，或在什么场景下需要这个功能
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 建议的方案
      description: 你期望的功能形态或 API 设计（如有想法）
      placeholder: |
        ```python
        # 期望的用法示例
        ```
  - type: textarea
    id: alternatives
    attributes:
      label: 你目前的替代方案
      description: 当前你是如何解决这个问题的
  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 其他相关的背景、参考或截图
