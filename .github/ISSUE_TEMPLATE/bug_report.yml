name: "Bug Report / Bug 报告"
description: "报告 SDK 或 CLI 的代码问题"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你提交 Bug 报告！请尽量填写以下信息，帮助我们快速定位和修复问题。
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰描述你遇到的问题
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 提供最小可复现的代码或步骤
      placeholder: |
        ```python
        import bigquant
        # 你的代码
        ```
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望的正确结果是什么
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么（如有报错请贴完整 traceback）
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: bigquant 版本
      description: "运行 `bigquant --version` 或 `pip show bigquant` 获取"
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python 版本
      description: "运行 `python --version` 获取"
      placeholder: "3.12.0"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: 操作系统
      placeholder: "macOS 15 / Ubuntu 24.04 / Windows 11"
  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 其他有助于排查的信息（截图、日志等）
